<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Gerenciar Categorias - Blog de Avaliações</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../public/css/style.css">
</head>

<body>
    <header>
        <div class="header-title-container text-center mb-5">
            <h1><i class="ph-fill ph-folders header-icon color-accent v-middle"></i> Gerenciar Categorias</h1>
        </div>
        <nav>
            <ul id="categoriesNav">
                <li><a href="index.html"><i class="ph ph-house"></i> Início</a></li>
                <li><a href="admin.html"><i class="ph-fill ph-gear"></i> Moderação (Admin)</a></li>
            </ul>
        </nav>
    </header>
    <main class="admin-main small">
        <div class="admin-container">
            <h2 class="section-title"><i class="ph-fill ph-plus-circle color-accent"></i> Criar Nova Categoria</h2>
            <form id="formCriarCategoria" class="category-form">
                <div class="form-group category-input-group">
                    <label>Nome da Categoria</label>
                    <input type="text" name="name" placeholder="Ex: Animes, Séries, Livros..." required>
                </div>
                <button type="submit" class="btn-search category-submit-btn">
                    <i class="ph ph-plus"></i> Adicionar
                </button>
            </form>
        </div>

        <div class="admin-container">
            <h2 class="section-title"><i class="ph-fill ph-tag color-accent"></i> Categorias Existentes</h2>
            <div id="categorias" class="flex-1">
                <div class="loading-container"><i class="ph ph-spinner-gap ph-spin size-2"></i></div>
            </div>
        </div>

        <!-- Modal de edição -->
        <div id="modalOverlay">
            <div id="modalContent">
                <h3 class="section-title"><i class="ph-fill ph-pencil-simple color-warning"></i> Editar Categoria</h3>
                <form id="formEditarCategoria">
                    <input type="hidden" name="id">
                    <div class="form-group">
                        <label>Nome da Categoria</label>
                        <input type="text" name="name" placeholder="Novo nome da categoria" required>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-clear" onclick="fecharModal()">
                            Cancelar
                        </button>
                        <button type="submit" class="btn-search">
                            <i class="ph ph-check"></i> Salvar Alterações
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Blog de Avaliações - <span class="app-version color-accent"><i class="ph ph-cpu"></i> Versão Autônoma</span></p>
    </footer>

    <script src="../public/js/script.js"></script>
    <script src="../public/js/api.js"></script>
    <script src="../public/js/categorias-view.js"></script>
</body>

</html>
