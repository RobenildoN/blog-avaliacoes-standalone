<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração - Blog de Avaliações</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .admin-table th,
        .admin-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .admin-table th {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-action {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 5px;
            font-weight: bold;
        }

        .btn-edit {
            background-color: #ffc107;
            color: #000;
        }

        .btn-delete {
            background-color: #dc3545;
            color: #000;
        }

        /* Modal simple styles */
        #modalOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #modalContent {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
        }
    </style>
</head>

<body>
    <header>
        <div style="text-align: center; margin-bottom: 5px;">
            <h1>Área Administrativa</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="categorias.html">Categorias</a></li>
            </ul>
        </nav>
    </header>

    <main style="max-width: 800px; margin: 15px auto; padding: 0 20px; flex: 1;">
        <div class="admin-container">
            <h2>Criar Novo Post</h2>
            <form id="formCriarPost" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Título*</label>
                    <input type="text" name="titulo" required>
                </div>
                <div class="form-group">
                    <label>Categoria*</label>
                    <select name="categoryId" id="selectCategoria" required>
                        <option value="">Selecione...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Imagem</label>
                    <input type="file" name="imagem" accept="image/*">
                </div>
                <div class="form-group">
                    <label>Resumo*</label>
                    <textarea name="resumo" rows="4" required></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Avaliação (1-5)*</label>
                        <input type="number" name="avaliacao" min="1" max="5" required>
                    </div>
                    <div class="form-group">
                        <label>Lido até</label>
                        <input type="text" name="lido_ate">
                    </div>
                </div>
                <div class="form-group">
                    <label>Link de Acesso</label>
                    <input type="url" name="link_acesso">
                </div>
                <button type="submit" class="btn-search"
                    style="width: auto; height: 40px; padding: 0 20px; border-radius: 4px; margin: 20px auto; display: block; cursor: pointer; border: none; font-weight: bold;">Salvar
                    Post</button>
            </form>
        </div>

        <div class="admin-container">
            <h2>Posts Existentes</h2>
            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Título</th>
                            <th>Categoria</th>
                            <th>Data</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaPosts">
                        <!-- Carregado dinamicamente -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Editar -->
    <div id="modalOverlay">
        <div id="modalContent">
            <h2>Editar Post</h2>
            <form id="formEditarPost">
                <input type="hidden" name="id">
                <div class="form-group">
                    <label>Título</label>
                    <input type="text" name="titulo" required>
                </div>
                <div class="form-group">
                    <label>Resumo</label>
                    <textarea name="resumo" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label>Avaliação</label>
                    <input type="number" name="avaliacao" min="1" max="5" required>
                </div>
                <div class="form-group">
                    <label>Trocar Imagem</label>
                    <input type="file" name="imagem" accept="image/*">
                </div>
                <div class="form-group">
                    <label>Lido até</label>
                    <input type="text" name="lido_ate">
                </div>
                <div class="form-group">
                    <label>Link de Acesso</label>
                    <input type="url" name="link_acesso">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn-search"
                        style="flex: 1; border-radius: 4px; height: 40px; font-weight: bold; cursor: pointer; border: none;">Atualizar</button>
                    <button type="button" class="btn-clear" onclick="fecharModal()"
                        style="flex: 1; border-radius: 4px; height: 40px; font-weight: bold; cursor: pointer; border: none;">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            carregarCategorias();
            carregarPosts();

            document.getElementById('formCriarPost').addEventListener('submit', criarPost);
            document.getElementById('formEditarPost').addEventListener('submit', atualizarPost);
        });

        async function carregarCategorias() {
            try {
                const response = await fetch('/categories');
                const categories = await response.json();
                const select = document.getElementById('selectCategoria');
                categories.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.id;
                    opt.textContent = cat.name;
                    select.appendChild(opt);
                });
            } catch (err) { console.error(err); }
        }

        async function carregarPosts() {
            try {
                const response = await fetch('/posts?limit=100');
                const data = await response.json();
                const posts = data.posts || [];
                const tbody = document.getElementById('listaPosts');

                tbody.innerHTML = posts.map(post => `
                    <tr>
                        <td>${post.id}</td>
                        <td>${post.titulo}</td>
                        <td>${post.Category ? post.Category.name : 'N/A'}</td>
                        <td>${formatarData(post.createdAt)}</td>
                        <td>
                            <button class="btn-action btn-edit" onclick="abrirEditar(${post.id})">Editar</button>
                            <button class="btn-action btn-delete" onclick="deletarPost(${post.id})">Excluir</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function criarPost(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            try {
                const response = await fetch('/posts', {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    alert('Post criado!');
                    e.target.reset();
                    carregarPosts();
                }
            } catch (err) { alert('Erro ao criar post'); }
        }

        async function deletarPost(id) {
            if (!confirm('Tem certeza?')) return;
            try {
                const response = await fetch(`/posts/${id}`, { method: 'DELETE' });
                if (response.ok) carregarPosts();
            } catch (err) { alert('Erro ao deletar'); }
        }

        async function abrirEditar(id) {
            try {
                const response = await fetch(`/posts/${id}`);
                const post = await response.json();

                const form = document.getElementById('formEditarPost');
                form.id.value = post.id;
                form.titulo.value = post.titulo;
                form.resumo.value = post.resumo;
                form.avaliacao.value = post.avaliacao;
                form.lido_ate.value = post.lido_ate || '';
                form.link_acesso.value = post.link_acesso || '';

                document.getElementById('modalOverlay').style.display = 'flex';
            } catch (err) { console.error(err); }
        }

        function fecharModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        async function atualizarPost(e) {
            e.preventDefault();
            const id = e.target.id.value;
            const formData = new FormData(e.target);

            try {
                const response = await fetch(`/posts/${id}`, {
                    method: 'PUT',
                    body: formData
                });
                if (response.ok) {
                    fecharModal();
                    carregarPosts();
                }
            } catch (err) { alert('Erro ao atualizar'); }
        }
    </script>
</body>

</html>
