<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://cdn.jsdelivr.net https://maxcdn.bootstrapcdn.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net https://maxcdn.bootstrapcdn.com; img-src 'self' data: blob: img: https://via.placeholder.com; connect-src 'self' https://unpkg.com;">
    <title>Detalhes do Post</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link rel="stylesheet" href="../public/css/style.css">
    <!-- Showdown Markdown Parser -->
    <script src="https://unpkg.com/showdown/dist/showdown.min.js"></script>
</head>

<body>
    <header>
        <div class="header-title-container text-center mb-5">
            <h1><i class="ph-fill ph-star-four header-icon color-accent v-middle"></i> Avaliações</h1>
        </div>

        <nav>
            <ul id="categoriesNav">
                <li><a href="index.html"><i class="ph ph-house"></i> Início</a></li>
                <li><a href="admin.html" class="link-admin"><i class="ph-fill ph-gear"></i> Admin</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <article class="post-card post-detail-article flex flex-column items-center">
            <div class="post-image-wrapper post-detail-img-wrapper mb-20 text-center" style="width: 100%; position: relative;">
                <img id="post-image" src="../public/img/exemplo.jpg" alt="Imagem do Post" class="post-image" style="margin: 0 auto; display: block; max-width: 100%; border-radius: var(--radius-md);">
            </div>

            <div class="flex items-center justify-center gap-15 mb-10 w-full">
                <h2 id="post-title" class="post-detail-title color-main text-center m-0" style="font-size: 2.5rem;">Título do Post</h2>
                <button class="btn-favorite-card" id="btnFavorite" onclick="toggleFavorito()" style="position: static; width: 45px; height: 45px; flex-shrink: 0;">
                    <i class="ph ph-heart" style="font-size: 1.6rem;"></i>
                </button>
            </div>
            
            <div class="post-detail-meta flex items-center justify-center gap-20 mb-20">
                <div id="post-rating" class="post-detail-rating fw-600">Avaliação: ★★★★☆</div>
            </div>

            <div id="post-summary" class="post-detail-summary mb-30">Resumo do post aqui...</div>

            <div class="post-info-blocks">
                <div id="post-lido-container" class="info-block" style="display: none; margin-bottom: 12px;">
                    <i class="ph ph-calendar-check info-block-icon"></i>
                    <strong class="info-block-label">Lido até/Assistido até:</strong> <span id="post-lido-ate" class="info-block-value"></span>
                </div>

                <div class="info-block" style="margin-bottom: 12px;">
                    <i class="ph ph-calendar-blank info-block-icon"></i>
                    <span class="badge" id="post-category" style="margin-right: 10px;">Categoria</span>
                    <span class="badge-status" id="post-status">Status</span>
                    <strong class="info-block-label">Data:</strong> <span id="post-date" class="info-block-value">01/01/2023</span>
                </div>

                <div id="post-link-container" class="info-block" style="display: none; margin-bottom: 12px;">
                    <i class="ph ph-link info-block-icon"></i>
                    <strong class="info-block-label">Fonte externa:</strong>
                    <a id="post-link" href="#" target="_blank" class="info-block-link">Acessar material original <i class="ph ph-arrow-up-right"></i></a>
                </div>
            </div>

            <div class="form-submit-container mt-30 flex-column gap-15">
                <div class="flex gap-10 justify-center">
                    <button class="btn-action" id="btnExportPDF" onclick="exportarPDF()">
                        <i class="ph ph-file-pdf"></i> Exportar PDF
                    </button>
                    <button class="btn-action btn-share-image" id="btnExportSocial" onclick="exportarImagemSocial()" title="Gerar imagem para Stories/WhatsApp">
                        <i class="ph ph-instagram-logo"></i> Img para compartilhar
                    </button>
                </div>
                <button id="editPostBtn" class="btn-search">
                    <i class="ph ph-pencil-simple"></i> Editar Avaliação
                </button>
            </div>
        </article>
    </main>

    <footer>
        <p>&copy; 2024 Blog de Avaliações - <span class="app-version color-accent"><i class="ph ph-cpu"></i> Versão
                Autônoma</span></p>
    </footer>

    <script src="../public/js/script.js"></script>
    <script src="../public/js/api.js"></script>
    <script src="../public/js/post-view.js"></script>
</body>

</html>
