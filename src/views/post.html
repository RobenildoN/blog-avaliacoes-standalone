<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://cdn.jsdelivr.net https://maxcdn.bootstrapcdn.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net https://maxcdn.bootstrapcdn.com; img-src 'self' data: blob:; connect-src 'self';">
    <title>Detalhes do Post</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../public/css/style.css">
    <!-- Showdown Markdown Parser -->
    <script src="https://unpkg.com/showdown/dist/showdown.min.js"></script>
</head>

<body>
    <header>
        <div class="header-title-container text-center mb-5">
            <h1><i class="ph-fill ph-star-four header-icon color-accent v-middle"></i> Avaliações</h1>
        </div>

        <nav>
            <ul id="categoriesNav">
                <li><a href="index.html"><i class="ph ph-house"></i> Início</a></li>
                <li><a href="admin.html" class="link-admin"><i class="ph-fill ph-gear"></i> Admin</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <article class="post-card post-detail-article flex flex-column">
            <div class="post-image-wrapper post-detail-img-wrapper">
                <img id="post-image" src="../public/img/exemplo.jpg" alt="Imagem do Post" class="post-image">
                <span class="post-category post-detail-category" id="post-category">Categoria</span>
            </div>

            <div class="post-content post-detail-content">
                <h2 id="post-title" class="post-detail-title color-main mb-20">Título do Post</h2>

                <div class="post-detail-meta flex items-center gap-20 mb-30">
                    <div id="post-rating" class="post-detail-rating">★★★★☆</div>
                    <span class="meta-divider">|</span>
                    <div class="meta-date">
                        <i class="ph ph-calendar-blank"></i> <span id="post-date">01/01/2023</span>
                    </div>
                </div>

                <div id="post-summary" class="post-detail-summary mb-30">Resumo do post aqui...</div>

                <div class="post-info-blocks">
                    <div id="post-lido-container" class="info-block" style="display: none;">
                        <i class="ph ph-calendar-check info-block-icon"></i>
                        <strong class="info-block-label">Lido até/Assistido até:</strong> <span id="post-lido-ate"
                            class="info-block-value"></span>
                    </div>

                    <div id="post-link-container" class="info-block" style="display: none;">
                        <i class="ph ph-link info-block-icon"></i>
                        <strong class="info-block-label">Fonte externa:</strong>
                        <a id="post-link" href="#" target="_blank" class="info-block-link">Acessar material original <i
                                class="ph ph-arrow-up-right"></i></a>
                    </div>
                </div>

                <div class="post-action-container">
                    <button id="editPostBtn" class="btn-search btn-edit-post">
                        <i class="ph ph-pencil-simple"></i> Editar Esta Avaliação
                    </button>
                </div>
            </div>
        </article>
    </main>

    <footer>
        <p>&copy; 2024 Blog de Avaliações - <span class="app-version color-accent"><i class="ph ph-cpu"></i> Versão
                Autônoma</span></p>
    </footer>

    <script src="../public/js/script.js"></script>
    <script src="../public/js/api.js"></script>
    <script src="../public/js/post-view.js"></script>
</body>

</html>
