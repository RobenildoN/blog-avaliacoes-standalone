<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../public/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --story-width: 1080px;
            --story-height: 1920px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: var(--story-width);
            height: var(--story-height);
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0b0f19;
            -webkit-font-smoothing: antialiased;
        }

        .story-container {
            width: var(--story-width);
            height: var(--story-height);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 40px;
        }
        
        .blob {
            position: absolute;
            width: 1400px;
            height: 1400px;
            background: radial-gradient(circle, #3b82f6 0%, transparent 75%);
            filter: blur(200px);
            opacity: 0.1;
            z-index: 1;
        }
        .blob-1 { top: -600px; left: -600px; }
        .blob-2 { bottom: -600px; right: -600px; }

        .content-card {
            position: relative;
            z-index: 10;
            width: 980px;
            height: 1500px; /* Reduzi mais a altura do card */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(60px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 80px;
            padding: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            box-shadow: 0 60px 120px -20px rgba(0, 0, 0, 0.8);
        }

        .meta-badges {
            display: flex;
            gap: 20px;
        }

        .badge {
            padding: 15px 35px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .category-badge { background: #3b82f6; color: white; }
        .status-badge { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2); }

        .post-title {
            font-size: 82px;
            font-weight: 900;
            text-align: center;
            line-height: 1.1;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            width: 100%;
            margin: 20px 0;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .post-image-container {
            width: 800px;
            height: 700px; /* Imagem ainda menor para caber tudo */
            position: relative;
            margin: 10px 0;
        }

        .post-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
            border: 3px solid rgba(255, 255, 255, 0.1);
        }

        .rating-container {
            font-size: 130px; /* Estrelas maiores embaixo */
            color: #fbbf24;
            display: flex;
            gap: 15px;
            filter: drop-shadow(0 10px 30px rgba(251, 191, 36, 0.6));
            margin-top: 20px;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 20px;
            opacity: 0.5;
            font-size: 36px;
            font-weight: 600;
            color: #fff;
            margin-top: 20px;
        }

        .footer-logo i { font-size: 46px; color: #3b82f6; }
    </style>
</head>
<body>
    <div class="story-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>

        <div class="content-card">
            <div class="meta-badges">
                <div id="post-category" class="badge category-badge">CATEGORIA</div>
                <div id="post-status" class="badge status-badge">STATUS</div>
            </div>

            <h1 id="post-title" class="post-title">Título da Obra</h1>

            <div class="post-image-container">
                <img id="post-image" src="" alt="" class="post-image">
            </div>

            <div id="post-rating" class="rating-container">
                ★★★★★
            </div>
            
            <div class="footer-logo">
                <i class="ph-fill ph-star-four"></i>
                <span>Blog de Avaliações</span>
            </div>
        </div>
    </div>

    <script>
        window.setData = (data) => {
            document.getElementById('post-title').innerText = data.titulo;
            document.getElementById('post-category').innerText = data.categoria || 'Avaliação';
            document.getElementById('post-status').innerText = data.status || 'Concluído';
            
            const rating = parseInt(data.avaliacao) || 0;
            document.getElementById('post-rating').innerHTML = 
                '★'.repeat(rating) + '☆'.repeat(5 - rating);
            
            const img = document.getElementById('post-image');
            img.src = data.imagem;

            if (img.complete) {
                window.isReady = true;
            } else {
                img.onload = () => { window.isReady = true; };
                img.onerror = () => { window.isReady = true; };
            }
        };
    </script>
</body>
</html>
