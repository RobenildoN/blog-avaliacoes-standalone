<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../public/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --story-width: 1080px;
            --story-height: 1920px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: var(--story-width);
            height: var(--story-height);
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            -webkit-font-smoothing: antialiased;
        }

        .story-container {
            width: var(--story-width);
            height: var(--story-height);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 80px 60px;
        }
        
        .blob {
            position: absolute;
            width: 1400px;
            height: 1200px;
            background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
            filter: blur(180px);
            opacity: 0.15;
            z-index: 1;
        }
        .blob-1 { top: -400px; left: -400px; }
        .blob-2 { bottom: -400px; right: -400px; }

        .content-card {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 1650px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 90px;
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 60px 120px -20px rgba(0, 0, 0, 0.7);
        }

        .meta-badges {
            display: flex;
            gap: 20px;
        }

        .badge {
            padding: 15px 35px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .category-badge { background: #3b82f6; color: white; }
        .status-badge { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2); }

        .post-image-container {
            width: 800px;
            height: 950px;
            position: relative;
        }

        .post-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 40px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            border: 4px solid rgba(255, 255, 255, 0.1);
        }

        .info-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .post-title {
            font-size: 80px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.1;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            width: 100%;
        }

        .rating-container {
            font-size: 110px;
            color: #fbbf24;
            display: flex;
            gap: 15px;
            filter: drop-shadow(0 5px 15px rgba(251, 191, 36, 0.5));
        }

        .footer-logo {
            margin-top: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            opacity: 0.4;
            font-size: 36px;
            font-weight: 600;
            color: #fff;
        }

        .footer-logo i { font-size: 46px; color: #3b82f6; }
    </style>
</head>
<body>
    <div class="story-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>

        <div class="content-card">
            <div class="meta-badges">
                <div id="post-category" class="badge category-badge">CATEGORIA</div>
                <div id="post-status" class="badge status-badge">STATUS</div>
            </div>

            <div class="post-image-container">
                <img id="post-image" src="" alt="" class="post-image">
            </div>

            <div class="info-section">
                <h1 id="post-title" class="post-title">Título da Obra</h1>
                <div id="post-rating" class="rating-container">
                    ★★★★★
                </div>
            </div>
        </div>

        <div class="footer-logo">
            <i class="ph-fill ph-star-four"></i>
            <span>Blog de Avaliações</span>
        </div>
    </div>

    <script>
        window.setData = (data) => {
            document.getElementById('post-title').innerText = data.titulo;
            document.getElementById('post-category').innerText = data.categoria || 'Avaliação';
            document.getElementById('post-status').innerText = data.status || 'Concluído';
            
            const rating = parseInt(data.avaliacao) || 0;
            document.getElementById('post-rating').innerHTML = 
                '★'.repeat(rating) + '☆'.repeat(5 - rating);
            
            const img = document.getElementById('post-image');
            img.src = data.imagem;

            if (img.complete) {
                window.isReady = true;
            } else {
                img.onload = () => { window.isReady = true; };
                img.onerror = () => { window.isReady = true; };
            }
        };
    </script>
</body>
</html>
