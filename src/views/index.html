<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog de Avaliações</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../public/css/style.css">
</head>

<body>
    <header>
        <div class="header-title-container text-center mb-5">
            <h1><i class="ph-fill ph-star-four header-icon color-accent v-middle"></i> Avaliações</h1>
        </div>

        <div class="search-box">
            <input type="text" placeholder="Pesquisar títulos, resumos ou categorias..." id="searchBox">
            <button class="btn-search" onclick="realizarBusca()"><i class="ph ph-magnifying-glass"></i> Buscar</button>
            <button class="btn-clear" onclick="limparBusca()"><i class="ph ph-x"></i></button>
        </div>

        <nav>
            <ul id="categoriesNav">
                <li><a href="#" class="active" onclick="filtrarPorCategoria(null, this)"><i class="ph ph-squares-four"></i> Todos</a></li>
                <!-- Categorias carregadas dinamicamente -->
            </ul>
        </nav>
    </header>

    <main>
        <section id="postsSection">
            <div class="section-header flex justify-between items-center mb-25 border-bottom">
                <h2 id="sectionTitle" class="section-title"><i class="ph ph-clock-counter-clockwise"></i> Últimos Posts</h2>
            </div>

            <div id="postsContainer" class="posts-container">
                <div class="loading">
                    <i class="ph ph-spinner-gap ph-spin size-2-5 color-accent"></i>
                    <p>Carregando avaliações...</p>
                </div>
            </div>

            <div id="paginationControls" class="pagination" style="display: none;">
                <button id="prevPageBtn" class="btn-clear" onclick="mudarPagina(-1)"><i class="ph ph-caret-left"></i> Anterior</button>
                <span id="pageInfo" class="page-info-text">Página 1 de 1</span>
                <button id="nextPageBtn" class="btn-search" onclick="mudarPagina(1)">Próximo <i class="ph ph-caret-right"></i></button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Blog de Avaliações - <span class="app-version color-accent"><i class="ph ph-cpu"></i> Versão Autônoma</span></p>
    </footer>

    <script src="../public/js/script.js"></script>
    <script src="../public/js/api.js"></script>
    <script src="../public/js/index-view.js"></script>
</body>

</html>
